
<style>
*{box-sizing:border-box;margin:0;padding:0;}
#app{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  border-radius:24px;
  display:grid;
  grid-template-columns:36px 1fr 36px;
  min-height:300px;
  position:relative;
  transition:background 0.5s;
}
.arrow-zone{
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;background:none;border:none;outline:none;
  -webkit-tap-highlight-color:transparent;
  user-select:none;width:36px;
}
.arr-icon{opacity:0;transition:opacity 0.18s;pointer-events:none;}
#app:hover .arr-icon{opacity:0.45;}
.arrow-zone:hover .arr-icon{opacity:0.9 !important;}
#panel{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2.8rem 0.5rem 2.2rem;
  position:relative;
}
#mode-label{
  font-size:0.57rem;letter-spacing:0.22em;text-transform:uppercase;
  font-weight:500;opacity:0.36;margin-bottom:1.4rem;
}
#clock-display{
  font-size:clamp(2.8rem,8vw,4.8rem);
  font-weight:700;letter-spacing:-0.04em;
  font-variant-numeric:tabular-nums;line-height:1.05;text-align:center;
}
#clock-sub{
  font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;
  font-weight:400;margin-top:0.5rem;opacity:0.36;text-align:center;
}
#timer-wrap{display:none;flex-direction:column;align-items:center;}
#ring-container{
  position:relative;width:190px;height:190px;
  display:flex;align-items:center;justify-content:center;
}
#ring-svg{position:absolute;top:0;left:0;width:190px;height:190px;}
#timer-input{
  font-size:clamp(2rem,5.5vw,2.7rem);
  font-weight:700;letter-spacing:-0.03em;
  font-variant-numeric:tabular-nums;
  background:none;border:none;outline:none;
  text-align:center;width:140px;
  caret-color:currentColor;
  position:relative;z-index:2;
  -webkit-tap-highlight-color:transparent;
}
#sw-wrap{display:none;flex-direction:column;align-items:center;}
#sw-display{
  font-size:clamp(2.6rem,7.5vw,4.2rem);
  font-weight:700;letter-spacing:-0.04em;
  font-variant-numeric:tabular-nums;line-height:1.05;text-align:center;
}
#sw-sub{font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;font-weight:400;margin-top:0.5rem;opacity:0.36;text-align:center;min-height:1.1em;}
#controls{display:flex;gap:18px;margin-top:1.5rem;align-items:center;}
.ctrl-btn{
  background:none;border:none;outline:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  padding:8px;border-radius:50%;
  -webkit-tap-highlight-color:transparent;
  transition:transform 0.1s;opacity:0.65;
}
.ctrl-btn:hover{opacity:1;}
.ctrl-btn:active{transform:scale(0.88);}
#menu-btn{
  position:absolute;top:14px;right:14px;
  display:flex;flex-direction:column;gap:4px;
  cursor:pointer;padding:5px;
  background:none;border:none;outline:none;
  opacity:0.28;transition:opacity 0.2s;z-index:5;
  -webkit-tap-highlight-color:transparent;
}
#menu-btn:hover{opacity:0.85;}
.dot{display:block;width:4px;height:4px;border-radius:50%;}
#color-input{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;}
</style>

<div id="app">
  <button class="arrow-zone" id="btn-left" onclick="navigate(-1)">
    <svg class="arr-icon" width="8" height="14" viewBox="0 0 8 14" fill="none">
      <path d="M6.5 1.5L1.5 7l5 5.5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div id="panel">
    <button id="menu-btn" onclick="document.getElementById('color-input').click()">
      <span class="dot" id="d1"></span>
      <span class="dot" id="d2"></span>
      <span class="dot" id="d3"></span>
    </button>
    <input type="color" id="color-input" value="#0d0d1a">
    <div id="mode-label">hora</div>
    <div id="clock-display"></div>
    <div id="clock-sub"></div>

    <div id="timer-wrap">
      <div id="ring-container">
        <svg id="ring-svg" viewBox="0 0 190 190">
          <circle id="ring-bg" cx="95" cy="95" r="82" fill="none" stroke-width="1.5"/>
          <circle id="ring-track" cx="95" cy="95" r="82" fill="none" stroke-width="1.5"
            stroke-linecap="round"
            transform="rotate(-90 95 95)"
            stroke-dasharray="515.22" stroke-dashoffset="0"/>
          <circle id="ring-dot" cx="95" cy="13" r="5"/>
        </svg>
        <input type="text" id="timer-input" maxlength="5" spellcheck="false" autocomplete="off">
      </div>
    </div>

    <div id="sw-wrap">
      <div id="sw-display">00:00.00</div>
      <div id="sw-sub"></div>
    </div>
    <div id="controls"></div>
  </div>

  <button class="arrow-zone" id="btn-right" onclick="navigate(1)">
    <svg class="arr-icon" width="8" height="14" viewBox="0 0 8 14" fill="none">
      <path d="M1.5 1.5L6.5 7l-5 5.5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<script>
const MODES=['clock','timer','stopwatch'];
let modeIdx=0,bgHex='#0d0d1a',tc='#4a4a8a';
let clockIv=null;
let timerTotal=300,timerLeft=300,timerRunning=false;
let timerStartTime=null,timerStartLeft=0;
let rafId=null;
let swMs=0,swRunning=false,swIv=null;

const days=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function hexRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function lumOf(h){const{r,g,b}=hexRgb(h);return 0.299*r+0.587*g+0.114*b;}
function shiftColor(h,a,lighter){
  let{r,g,b}=hexRgb(h);
  if(lighter){r=Math.min(255,Math.round(r+(255-r)*a));g=Math.min(255,Math.round(g+(255-g)*a));b=Math.min(255,Math.round(b+(255-b)*a));}
  else{r=Math.max(0,Math.round(r*(1-a)));g=Math.max(0,Math.round(g*(1-a)));b=Math.max(0,Math.round(b*(1-a)));}
  return'#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function applyColor(hex){
  bgHex=hex;
  const dark=lumOf(hex)<140;
  tc=shiftColor(hex,0.4,dark);
  document.getElementById('app').style.background=hex;
  document.querySelectorAll('#clock-display,#clock-sub,#mode-label,#sw-display,#sw-sub,#timer-input').forEach(el=>el.style.color=tc);
  ['d1','d2','d3'].forEach(id=>document.getElementById(id).style.background=tc);
  const aC=dark?'rgba(255,255,255,0.7)':'rgba(0,0,0,0.55)';
  document.querySelectorAll('.arr-icon path').forEach(p=>p.setAttribute('stroke',aC));
  const rBg=dark?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.1)';
  document.getElementById('ring-bg').setAttribute('stroke',rBg);
  document.getElementById('ring-track').setAttribute('stroke',tc);
  document.getElementById('ring-dot').setAttribute('fill',tc);
  document.querySelectorAll('.ctrl-btn svg *').forEach(el=>{
    if(el.tagName==='polygon'||el.tagName==='rect'){el.setAttribute('fill',tc);el.removeAttribute('stroke');}
    else if(el.hasAttribute('stroke')){el.setAttribute('stroke',tc);}
  });
}

function pad(n){return String(Math.floor(n)).padStart(2,'0');}
function fmtSecs(s){return pad(Math.floor(s/60))+':'+pad(s%60);}
function fmtMs(ms){return pad(Math.floor(ms/60000))+':'+pad(Math.floor((ms%60000)/1000))+'.'+pad(Math.floor((ms%1000)/10));}

const R=82,CX=95,CY=95,CIRC=2*Math.PI*R;

function setRingPct(pct){
  pct=Math.max(0,Math.min(1,pct));
  document.getElementById('ring-track').setAttribute('stroke-dashoffset',String(CIRC*(1-pct)));
  const angle=-Math.PI/2+2*Math.PI*pct;
  document.getElementById('ring-dot').setAttribute('cx',String(CX+R*Math.cos(angle)));
  document.getElementById('ring-dot').setAttribute('cy',String(CY+R*Math.sin(angle)));
}

function timerRaf(){
  if(!timerRunning)return;
  const elapsed=(Date.now()-timerStartTime)/1000;
  const left=Math.max(0,timerStartLeft-elapsed);
  const pct=left/timerTotal;

  setRingPct(pct);
  const secs=Math.ceil(left);
  document.getElementById('timer-input').value=fmtSecs(secs);

  if(left<=0){
    timerRunning=false;timerLeft=0;
    document.getElementById('timer-input').disabled=false;
    document.getElementById('timer-input').value=fmtSecs(0);
    setRingPct(0);
    buildControls();applyColor(bgHex);
    return;
  }
  rafId=requestAnimationFrame(timerRaf);
}

function renderClock(){
  const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Europe/Madrid'}));
  document.getElementById('clock-display').textContent=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  document.getElementById('clock-sub').textContent=days[now.getDay()]+' · '+now.getDate()+' de '+months[now.getMonth()];
}

const timerInput=document.getElementById('timer-input');

function parseMmSs(str){
  const s=str.replace(/[^\d:]/g,'');
  const p=s.split(':');
  if(p.length===2)return(parseInt(p[0])||0)*60+Math.min(59,parseInt(p[1])||0);
  const n=parseInt(s)||0;
  if(n>99)return Math.floor(n/100)*60+Math.min(59,n%100);
  return n*60;
}

timerInput.addEventListener('focus',()=>{if(!timerRunning)timerInput.select();});
timerInput.addEventListener('blur',()=>{
  if(timerRunning)return;
  const v=parseMmSs(timerInput.value);
  timerTotal=Math.max(5,Math.min(5999,v||timerTotal));
  timerLeft=timerTotal;
  timerInput.value=fmtSecs(timerTotal);
  setRingPct(1);applyColor(bgHex);
});
timerInput.addEventListener('keydown',e=>{if(e.key==='Enter')timerInput.blur();});

function buildControls(){
  const c=document.getElementById('controls');c.innerHTML='';
  const mode=MODES[modeIdx];
  function mkBtn(inner,cb){
    const b=document.createElement('button');
    b.className='ctrl-btn';
    b.innerHTML='<svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7">'+inner+'</svg>';
    b.onclick=cb;c.appendChild(b);
  }
  if(mode==='timer'){
    const play='<polygon points="5,3 19,11 5,19"/>';
    const pause='<rect x="4" y="3" width="5" height="16" rx="1.5"/><rect x="13" y="3" width="5" height="16" rx="1.5"/>';
    mkBtn(timerRunning?pause:play,()=>{
      if(timerRunning){
        cancelAnimationFrame(rafId);
        timerLeft=Math.max(0,timerStartLeft-(Date.now()-timerStartTime)/1000);
        timerRunning=false;
        timerInput.disabled=false;
        timerInput.value=fmtSecs(Math.ceil(timerLeft));
      } else {
        if(timerLeft<=0)timerLeft=timerTotal;
        timerInput.disabled=true;timerRunning=true;
        timerStartTime=Date.now();timerStartLeft=timerLeft;
        rafId=requestAnimationFrame(timerRaf);
      }
      buildControls();applyColor(bgHex);
    });
    mkBtn('<polyline points="5,5 5,12 12,12" stroke="currentColor"/><path d="M5 12A6 6 0 1 1 8.5 17" stroke="currentColor"/>',()=>{
      cancelAnimationFrame(rafId);timerRunning=false;timerInput.disabled=false;
      timerLeft=timerTotal;timerInput.value=fmtSecs(timerTotal);
      setRingPct(1);buildControls();applyColor(bgHex);
    });
  }
  if(mode==='stopwatch'){
    const play='<polygon points="5,3 19,11 5,19"/>';
    const pause='<rect x="4" y="3" width="5" height="16" rx="1.5"/><rect x="13" y="3" width="5" height="16" rx="1.5"/>';
    mkBtn(swRunning?pause:play,()=>{
      if(swRunning){clearInterval(swIv);swRunning=false;}
      else{const t=Date.now()-swMs;swRunning=true;swIv=setInterval(()=>{swMs=Date.now()-t;document.getElementById('sw-display').textContent=fmtMs(swMs);applyColor(bgHex);},50);}
      buildControls();applyColor(bgHex);
    });
    mkBtn('<polyline points="5,5 5,12 12,12" stroke="currentColor"/><path d="M5 12A6 6 0 1 1 8.5 17" stroke="currentColor"/>',()=>{
      clearInterval(swIv);swRunning=false;swMs=0;
      document.getElementById('sw-display').textContent=fmtMs(0);
      document.getElementById('sw-sub').textContent='';
      buildControls();applyColor(bgHex);
    });
    mkBtn('<circle cx="11" cy="11" r="7" stroke="currentColor"/><line x1="11" y1="7.5" x2="11" y2="11" stroke="currentColor"/><line x1="11" y1="11" x2="14" y2="13" stroke="currentColor"/>',()=>{
      document.getElementById('sw-sub').textContent='vuelta · '+fmtMs(swMs);
    });
  }
  applyColor(bgHex);
}

function showOnly(ids){
  ['clock-display','clock-sub'].forEach(id=>document.getElementById(id).style.display=ids.includes(id)?'block':'none');
  document.getElementById('timer-wrap').style.display=ids.includes('timer-wrap')?'flex':'none';
  document.getElementById('sw-wrap').style.display=ids.includes('sw-wrap')?'flex':'none';
}

function setMode(idx){
  modeIdx=((idx%3)+3)%3;
  clearInterval(clockIv);cancelAnimationFrame(rafId);clearInterval(swIv);
  timerRunning=false;swRunning=false;timerInput.disabled=false;
  const btnL=document.getElementById('btn-left'),btnR=document.getElementById('btn-right');
  btnL.style.visibility='visible';btnR.style.visibility='visible';
  const mode=MODES[modeIdx];
  if(mode==='clock'){
    document.getElementById('mode-label').textContent='hora';
    btnL.style.visibility='hidden';
    showOnly(['clock-display','clock-sub']);
    renderClock();clockIv=setInterval(()=>{renderClock();applyColor(bgHex);},1000);
  } else if(mode==='timer'){
    document.getElementById('mode-label').textContent='temporizador';
    showOnly(['timer-wrap']);
    timerLeft=timerTotal;timerInput.value=fmtSecs(timerTotal);setRingPct(1);
  } else {
    document.getElementById('mode-label').textContent='cronómetro';
    btnR.style.visibility='hidden';
    showOnly(['sw-wrap']);swMs=0;swRunning=false;
    document.getElementById('sw-display').textContent=fmtMs(0);
    document.getElementById('sw-sub').textContent='';
  }
  buildControls();applyColor(bgHex);
}

function navigate(dir){setMode(modeIdx+dir);}
document.getElementById('color-input').addEventListener('input',e=>applyColor(e.target.value));
setMode(0);
</script>
